<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    {% seo %}
    
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/styles.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/img/favicon.png">
    
</head>
<body>

    {% include header.html %}

    <main>
        {{ content }}
    </main>

    {% include footer.html %}

    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
    <script type="text/javascript">
        window.onload = function() { 
            Calendly.initBadgeWidget({ 
                url: 'https://calendly.com/duvaldvl/30min', 
                text: 'Je réserve un appel', 
                color: '#009966', 
                textColor: '#ffffff', 
                branding: false 
            }); 
        }
    </script>

    <div id="cookie-banner" class="cookie-banner">
        <div class="cookie-title">
            <span>🍪</span> Cookies & Confidentialité
        </div>
        <p class="cookie-text">
            J'utilise des cookies pour améliorer votre expérience. 
            <a href="{{ site.baseurl }}/confidentialite" style="text-decoration: underline; color: var(--primary-color);">En savoir plus</a>.
        </p>
        <div class="cookie-buttons">
            <button id="cookie-refuse" class="btn-cookie-refuse">Continuer sans</button>
            <button id="cookie-accept" class="btn-cookie-accept">Accepter</button>
        </div>
    </div>

    <script>
    // Fonction pour charger Google Analytics dynamiquement
    function loadGoogleAnalytics() {
        // Évite de charger le script deux fois
        if (document.getElementById('ga-script')) return;

        const script = document.createElement('script');
        script.id = 'ga-script';
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-3Y1XQ1JLJN';
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-3Y1XQ1JLJN');
    }

    document.addEventListener('DOMContentLoaded', function() {
        const cookieBanner = document.getElementById('cookie-banner');
        const acceptBtn = document.getElementById('cookie-accept');
        const refuseBtn = document.getElementById('cookie-refuse');
        
        // On vérifie le statut du consentement dans le navigateur
        const consentStatus = localStorage.getItem('cookieConsent');

        if (consentStatus === 'accepted') {
            // L'utilisateur a déjà accepté, on charge GA silencieusement
            loadGoogleAnalytics();
        } else if (!consentStatus) {
            // Nouvel utilisateur : on affiche la bannière
            setTimeout(function() {
                cookieBanner.style.display = 'block';
            }, 1000);
        }

        acceptBtn.addEventListener('click', function() {
            localStorage.setItem('cookieConsent', 'accepted');
            cookieBanner.style.display = 'none';
            // L'utilisateur vient d'accepter, on déclenche GA immédiatement
            loadGoogleAnalytics(); 
        });

        refuseBtn.addEventListener('click', function() {
            localStorage.setItem('cookieConsent', 'refused');
            cookieBanner.style.display = 'none';
            // L'utilisateur a refusé, on ne charge rien du tout
        });
    });
</script>

</body>
</html>
