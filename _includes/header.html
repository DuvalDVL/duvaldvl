<header class="site-header">
    <div class="container navbar">
        <a href="{{ site.baseurl }}/" class="logo">Duval <span>DVL.</span></a>
        
        <div class="menu-toggle" id="mobile-menu">☰</div>
        
        <nav class="nav-links" id="nav-links">
            <a href="{{ site.baseurl }}/creation-sites-internet/" class="{% if page.url contains '/creation-sites-internet' %}active-link{% endif %}">Site Internet</a>
            
            <a href="{{ site.baseurl }}/referencement-local/" class="{% if page.url contains '/referencement-local' %}active-link{% endif %}">SEO Local</a>
            
            <a href="{{ site.baseurl }}/publicite-google-ads/" class="{% if page.url contains '/publicite-google-ads' %}active-link{% endif %}">Google Ads</a>
            
            <a href="{{ site.baseurl }}/nos-realisations/" class="{% if page.url contains '/nos-realisations' %}active-link{% endif %}">Réalisations</a>
            
            <a href="{{ site.baseurl }}/blog/" class="{% if page.url contains '/blog' %}active-link{% endif %}">Blog</a>
            
            <a href="{{ site.baseurl }}/a-propos/" class="{% if page.url contains '/a-propos' %}active-link{% endif %}">À propos</a>
            
            <a href="{{ site.baseurl }}/contact/" class="btn" style="padding: 10px 24px; font-size: 0.95rem;">Contact</a>
        </nav>
    </div>
</header>

<script>
    // Script menu mobile fluide (Slide-in)
    const mobileMenuBtn = document.getElementById('mobile-menu');
    const navLinks = document.getElementById('nav-links');

    mobileMenuBtn.addEventListener('click', function() {
        navLinks.classList.toggle('active');
        
        // Change l'icône burger en croix et gère le défilement
        if (navLinks.classList.contains('active')) {
            mobileMenuBtn.innerHTML = '✕';
            mobileMenuBtn.style.fontSize = '2rem'; // Ajuste la taille de la croix
            document.body.style.overflow = 'hidden'; // Empêche de scroller le site derrière
        } else {
            mobileMenuBtn.innerHTML = '☰';
            mobileMenuBtn.style.fontSize = '1.8rem'; // Remet la taille du burger
            document.body.style.overflow = 'auto'; // Réactive le scroll
        }
    });

    // (Optionnel mais recommandé) Fermer le menu si on clique sur un lien
    const menuLinks = navLinks.querySelectorAll('a');
    menuLinks.forEach(link => {
        link.addEventListener('click', () => {
            navLinks.classList.remove('active');
            mobileMenuBtn.innerHTML = '☰';
            document.body.style.overflow = 'auto';
        });
    });
</script>
